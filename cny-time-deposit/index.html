ions);let plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64bytes(GATE.iv)},key,b64bytes(GATE.cipher));if(remember)setCachedPw(pw);document.open();document.write(new TextDecoder().decode(plain));document.close();}catch(e){localStorage.removeItem(CACHE_KEY);if(err)err.textContent='密碼不正確'}}document.getElementById('btn').onclick=()=>unlock(document.getElementById('pw').value,true);document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock(document.getElementById('pw').value,true)});let cached=getCachedPw();if(cached)unlock(cached,false);
