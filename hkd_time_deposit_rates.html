it){let material=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:it,hash:'SHA-256'},material,{name:'AES-GCM',length:256},false,['decrypt'])}function getCachedPw(){try{let c=JSON.parse(localStorage.getItem(CACHE_KEY)||'null');if(!c||!c.pw||!c.expires||Date.now()>c.expires){localStorage.removeItem(CACHE_KEY);return ''}return c.pw}catch(e){localStorage.removeItem(CACHE_KEY);return ''}}function setCachedPw(pw){try{localStorage.setItem(CACHE_KEY,JSON.stringify({pw,expires:Date.now()+TTL_MS}))}catch(e){}}async function unlock(pw,remember=true){let err=document.getElementById('err');if(err)err.textContent='';try{let key=await deriveKey(pw,b64bytes(GATE.salt),GATE.iterations);let plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64bytes(GATE.iv)},key,b64bytes(GATE.cipher));if(remember)setCachedPw(pw);document.open();document.write(new TextDecoder().decode(plain));document.close();}catch(e){localStorage.removeItem(CACHE_KEY);if(err)err.textContent='密碼不正確'}}document.getElementById('btn').onclick=()=>unlock(document.getElementById('pw').value,true);document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock(document.getElementById('pw').value,true)});let cached=getCachedPw();if(cached)unlock(cached,false);
